<script>
// Ajusta automaticamente a URL correta da Web App do Script
var URL_GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbyUamO3BX9qtYVTx-gYMRa1DzgISeDTQdWCNSKX7U_zjtVsCoSfXSvURA_JFURUnTzg0g/exec"; 
if(window.location.href.includes("script.google.com")) {
  URL_GOOGLE_SCRIPT = window.location.href.split('/exec')[0] + '/exec';
}

var catalogo = { produtos: [], logoUrl: "", fretes: {} };
var cesta = {};
var refModalAtivo = null;
var fluxoOrigem = 'd';
var pedidoSalvo = false;
var clienteCompletoAtivo = null;
var dadosAtuaisDoPedido = null;
var tabelaAtualAplicada = ''; // Guarda a tabela ativa para saber se precisa de atualizar os visuais

function normalizarReferencia(val) {
  if (!val) return '';
  var s = String(val).trim();
  if (s.endsWith('.0')) s = s.slice(0, -2);
  return s.toLowerCase();
}

function fmt(v) {
  return Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ─────────────────────────────────────────────────────────────
// REGRAS DE NEGÓCIO: RESOLUÇÃO DE TABELA E PREÇO
// ─────────────────────────────────────────────────────────────

// Calcula o subtotal temporário para descobrir em qual tabela o cliente se enquadra
function getTabelaAtual() {
  var tipoIcms = document.getElementById('icms-d') ? document.getElementById('icms-d').value : '7';
  var subtotalTemp = 0;
  
  // Tabela base para estimar se atinge a meta
  var tabelaTemp = tipoIcms === '7' ? 'M26071' : 'M260121';

  for (var ref in cesta) {
    var qty = cesta[ref];
    if (qty > 0) {
      var p = catalogo.produtos.find(prod => normalizarReferencia(prod.codigo) === ref);
      if (p) {
        subtotalTemp += getPreco(p, tabelaTemp) * qty;
      }
    }
  }

  // Define as regras de corte financeiro
  if (tipoIcms === '7') {
    return subtotalTemp >= 5000.00 ? 'M26072' : 'M26071';
  } else {
    return subtotalTemp >= 2500.00 ? 'M260122' : 'M260121';
  }
}

// Extrai o preço do produto respeitando a Coluna P (usarPrecoO) e a tabela ativa
function getPreco(p, tabela) {
  if (!p) return 0;
  var usaColunaO = p.usarPrecoO && p.usarPrecoO[tabela] === true;
  if (usaColunaO) {
    return parseFloat(p.precosPromo && p.precosPromo[tabela]) || 0;
  }
  return parseFloat(p.precos && p.precos[tabela]) || 0;
}

// ─────────────────────────────────────────────────────────────
// INICIALIZAÇÃO E RENDERIZAÇÃO
// ─────────────────────────────────────────────────────────────

window.addEventListener('DOMContentLoaded', () => {
  carregarCatalogo(false);
});

function carregarCatalogo(forceUpdate) {
  var url = URL_GOOGLE_SCRIPT + (forceUpdate ? "?atualizar=true" : "");
  
  document.getElementById('grid').innerHTML = Array(8).fill().map(() => `
    <div class="sk-card" style="height:240px; padding:10px;">
      <div class="skeleton" style="height:130px; margin-bottom:10px;"></div>
      <div class="skeleton" style="height:15px; width:40%; margin-bottom:6px;"></div>
      <div class="skeleton" style="height:30px; margin-bottom:8px;"></div>
      <div class="skeleton" style="height:20px; width:60%;"></div>
    </div>
  `).join('');

  fetch(url)
    .then(res => res.json())
    .then(data => {
      catalogo = data;
      pedidoSalvo = false;

      var marcasSet = new Set();
      catalogo.produtos.forEach(p => {
        if(p.descricao) {
          var prime = p.descricao.trim().split(' ')[0].toUpperCase();
          if(prime.length > 2) marcasSet.add(prime);
        }
      });
      var htmlMarca = '<option value="">TODAS</option>';
      marcasSet.forEach(m => { htmlMarca += `<option value="${m}">${m}</option>`; });
      document.getElementById('fil-marca').innerHTML = htmlMarca;

      var ufs = [];
      if (Array.isArray(catalogo.estados) && catalogo.estados.length > 0) {
        ufs = catalogo.estados.map(e => String(e).toUpperCase().trim()).filter(Boolean).sort();
      } else if (catalogo.fretes) {
        ufs = Object.keys(catalogo.fretes).sort();
      }
      var htmlUf = '<option value="">Selecione o Estado...</option>';
      ufs.forEach(uf => { htmlUf += `<option value="${uf}">${uf}</option>`; });
      document.getElementById('uf-d').innerHTML = htmlUf;
      document.getElementById('uf-m').innerHTML = htmlUf;

      if(catalogo.logoUrl) {
        document.getElementById('logo-area').innerHTML = `<img src="${catalogo.logoUrl}" alt="Logo">`;
      }

      tabelaAtualAplicada = getTabelaAtual();
      renderizarProdutos(catalogo.produtos);
      atualizarPainel();
    })
    .catch(err => {
      console.error(err);
      document.getElementById('grid').innerHTML = '<div class="vazio" style="grid-column:1/-1">Erro ao carregar catálogo. Certifique-se de que o Script está publicado como Web App.</div>';
    });
}

function renderizarProdutos(lista) {
  var tabelaAtiva = tabelaAtualAplicada || getTabelaAtual();
  var html = '';
  
  if(lista.length === 0) {
    document.getElementById('grid').innerHTML = '<div class="vazio" style="grid-column:1/-1">Nenhum produto encontrado.</div>';
    document.getElementById('cont').textContent = '0 produtos';
    return;
  }

  lista.forEach(p => {
    var ref = normalizarReferencia(p.codigo);
    var qty = cesta[ref] || 0;
    
    // Obtém o preço exato mediante a tabela em vigor
    var precoUn = getPreco(p, tabelaAtiva);
    var emPromo = p.usarPrecoO && p.usarPrecoO[tabelaAtiva] === true;
    
    var badgePromo = emPromo ? '<div class="card-badge-promo">PROMO</div>' : '';
    var classePromo = emPromo ? ' promo' : '';
    
    var imgHtml = p.fileId ? `<img src="https://drive.google.com/thumbnail?id=${p.fileId}&sz=w300" onload="this.classList.add('loaded')">` : '<span class="no-img-icon">📦</span>';

    html += `
      <div class="card${qty > 0 ? ' sel' : ''}${classePromo}" id="card-${ref}" onclick="abrirModal('${ref}')">
        ${badgePromo}
        <div class="card-badge-qty" id="badge-qty-${ref}" style="${qty > 0 ? 'display:block' : 'display:none'}">${qty}</div>
        <div class="card-img">${imgHtml}</div>
        <div class="card-body">
          <div class="card-cod">${p.codigo}</div>
          <div class="card-desc" title="${p.descricao}">${p.descricao}</div>
          <div class="card-bottom">
            <div class="card-preco">R$ ${fmt(precoUn)}</div>
            <div class="card-emb">Emb: ${p.qtdEmbalagem}</div>
          </div>
        </div>
      </div>
    `;
  });

  document.getElementById('grid').innerHTML = html;
  document.getElementById('cont').textContent = `${lista.length} ${lista.length === 1 ? 'produto' : 'produtos'}`;
}

function filtrar() {
  if(!catalogo.produtos) return;
  var busca = document.getElementById('busca').value.toLowerCase().trim();
  var marca = document.getElementById('fil-marca').value;
  var precoMax = parseFloat(document.getElementById('fil-preco').value) || Infinity;
  var tabelaAtiva = tabelaAtualAplicada || getTabelaAtual();

  var filtrados = catalogo.produtos.filter(p => {
    var ref = normalizarReferencia(p.codigo);
    var desc = p.descricao.toLowerCase();
    var ean = (p.codigoEan || '').toLowerCase();
    
    var mBusca = !busca || ref.includes(busca) || desc.includes(busca) || ean.includes(busca);
    var mMarca = !marca || desc.startsWith(marca.toLowerCase()) || desc.includes(' ' + marca.toLowerCase());
    
    var precoUn = getPreco(p, tabelaAtiva);
    var mPreco = precoUn <= precoMax;

    return mBusca && mMarca && mPreco;
  });

  renderizarProdutos(filtrados);
}

function limFiltros() {
  document.getElementById('busca').value = '';
  document.getElementById('fil-marca').value = '';
  document.getElementById('fil-preco').value = '';
  filtrar();
}

function sincronizarPlanilha() {
  var btn = document.getElementById('btn-sync');
  btn.disabled = true;
  btn.textContent = "🔄 A atualizar...";
  carregarCatalogo(true);
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = "🔄 Sincronizar Catálogo";
  }, 2500);
}

function syncRegras(idOrigem, idDestino) {
  var val = document.getElementById(idOrigem).value;
  document.getElementById(idDestino).value = val;
  atualizarPainel();
}

// ─────────────────────────────────────────────
// CÁLCULO CORE: REGRAS DE PRODUTOS E FRETE POR ESTADO
// ─────────────────────────────────────────────
function atualizarPainel() {
  var tabelaAtiva = getTabelaAtual();
  
  // Deteta se o utilizador adicionou itens suficientes para mudar de tabela e atualiza os visuais
  if (tabelaAtualAplicada !== tabelaAtiva) {
    tabelaAtualAplicada = tabelaAtiva;
    setTimeout(filtrar, 10);
  }

  var pctPrazo = parseInt(document.getElementById('prazo-d').value) || 0;
  var ufAtiva = document.getElementById('uf-d').value;

  var subtotal = 0;
  var totalIpi = 0;
  var totalItensQtd = 0;
  var htmlLista = '';
  var itensArray = [];

  for (var ref in cesta) {
    var qty = cesta[ref];
    if(qty <= 0) continue;

    var p = catalogo.produtos.find(prod => normalizarReferencia(prod.codigo) === ref);
    if(!p) continue;

    var precoUn = getPreco(p, tabelaAtiva);
    var totalItem = precoUn * qty;
    var ipiItem = totalItem * ((p.ipi || 0) / 100);

    subtotal += totalItem;
    totalIpi += ipiItem;
    totalItensQtd += qty;

    itensArray.push({
      codigo: p.codigo,
      descricao: p.descricao,
      emb: p.qtdEmbalagem,
      qty: qty,
      preco: precoUn,
      ipi: p.ipi,
      totalItem: totalItem,
      emPromocao: p.usarPrecoO && p.usarPrecoO[tabelaAtiva] === true
    });

    htmlLista += `
      <div class="sel-row">
        <div class="sel-cod" title="${p.codigo}">${p.codigo}</div>
        <div class="sel-desc" title="${p.descricao}">${p.descricao}</div>
        <div class="sel-qty-wrap">
          <button class="qty-btn" onclick="mudaQtyCesta('${ref}', -1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="mudaQtyCesta('${ref}', 1)">+</button>
        </div>
        <div class="sel-rm" onclick="removeCesta('${ref}')">&times;</div>
      </div>
    `;
  }

  if (totalItensQtd === 0) {
    var vHtml = '<div class="vazio">Nenhum produto selecionado</div>';
    document.getElementById('lista-d').innerHTML = vHtml;
    document.getElementById('lista-m').innerHTML = vHtml;
    
    ['rd','rm'].forEach(pfx => {
      document.getElementById(`${pfx}-bruto-prod`).textContent = 'R$ 0,00';
      document.getElementById(`${pfx}-prazo-val`).textContent = '- R$ 0,00';
      document.getElementById(`${pfx}-ipi-val`).textContent = '+ R$ 0,00';
      document.getElementById(`${pfx}-frete-val`).textContent = 'Selecione o Estado';
      document.getElementById(`${pfx}-frete-val`).style.color = 'var(--texto)';
      document.getElementById(`${pfx}-total`).textContent = 'R$ 0,00';
      document.getElementById(`btn-orc-${pfx.slice(-1)}`).disabled = true;
      document.getElementById(`btn-orc-${pfx.slice(-1)}`).textContent = 'Finalizar e Salvar Pedido';
      document.getElementById(`btn-xls-${pfx.slice(-1)}`).disabled = true;
      document.getElementById(`btn-xls-${pfx.slice(-1)}`).className = 'btn pdf-btn';
    });
    
    document.getElementById('badge').style.display = 'none';
    document.getElementById('mob-bar').style.display = 'none';
    return;
  }

  document.getElementById('lista-d').innerHTML = htmlLista;
  document.getElementById('lista-m').innerHTML = htmlLista;

  var valPrazo = subtotal * (pctPrazo / 100);
  
  var valorFrete = 0;
  var freteTxt = 'Grátis';
  var freteBloqueado = false;

  if (!ufAtiva) {
    freteTxt = 'Selecione o Estado';
    freteBloqueado = true;
  } else if (catalogo.fretes && catalogo.fretes[ufAtiva]) {
    var regra = catalogo.fretes[ufAtiva];
    
    if (subtotal < regra.minimoPedido) {
      freteTxt = `Abaixo do Limite (Min: R$ ${fmt(regra.minimoPedido)})`;
      freteBloqueado = true;
    } else if (subtotal >= regra.freteGratis) {
      valorFrete = 0;
      freteTxt = 'Grátis';
    } else {
      valorFrete = regra.valorFrete;
      freteTxt = `R$ ${fmt(valorFrete)}`;
    }
  } else {
    freteTxt = 'Grátis (Sem regra)';
    valorFrete = 0;
  }

  var liquido = subtotal - valPrazo + totalIpi + valorFrete;

  ['rd','rm'].forEach(pfx => {
    document.getElementById(`${pfx}-bruto-prod`).textContent = 'R$ ' + fmt(subtotal) + ' (' + tabelaAtiva + ')';
    document.getElementById(`${pfx}-prazo-pct`).textContent = pctPrazo;
    document.getElementById(`${pfx}-prazo-val`).textContent = '- R$ ' + fmt(valPrazo);
    document.getElementById(`${pfx}-ipi-val`).textContent = '+ R$ ' + fmt(totalIpi);
    document.getElementById(`${pfx}-frete-val`).textContent = freteTxt;
    document.getElementById(`${pfx}-total`).textContent = 'R$ ' + fmt(liquido);

    var btnFecho = document.getElementById(`btn-orc-${pfx.slice(-1)}`);
    if(freteBloqueado) {
      document.getElementById(`${pfx}-frete-val`).style.color = '#e24b4a';
      document.getElementById(`${pfx}-frete-val`).style.fontWeight = 'bold';
      btnFecho.disabled = true;
      btnFecho.textContent = ufAtiva ? 'Abaixo do Limite Mínimo' : 'Selecione o Estado';
    } else {
      document.getElementById(`${pfx}-frete-val`).style.color = valorFrete > 0 ? 'var(--texto)' : 'var(--verde-dk)';
      btnFecho.disabled = false;
      btnFecho.textContent = 'Finalizar e Salvar Pedido';
    }

    var btnPdf = document.getElementById(`btn-xls-${pfx.slice(-1)}`);
    if(pedidoSalvo) {
      btnPdf.disabled = false;
      btnPdf.className = 'btn pdf-btn liberado';
    } else {
      btnPdf.disabled = true;
      btnPdf.className = 'btn pdf-btn';
    }
  });

  document.getElementById('badge').textContent = `${totalItensQtd} itens`;
  document.getElementById('badge').style.display = 'block';
  
  document.getElementById('mob-bar').style.display = 'flex';
  document.getElementById('mb-info').innerHTML = `<b>Total: R$ ${fmt(liquido)}</b><br>${totalItensQtd} itens`;

  dadosAtuaisDoPedido = {
    itens: itensArray,
    subtotalProdutos: subtotal,
    totalIpi: totalIpi,
    totalDescontos: valPrazo,
    pctPrazo: pctPrazo,
    valorFrete: valorFrete,
    uf: ufAtiva,
    prazo: document.getElementById('prazo-d').options[document.getElementById('prazo-d').selectedIndex].text,
    tabelaAtiva: tabelaAtiva,
    total: liquido,
    qtd: totalItensQtd
  };
}

function mudaQtyCesta(ref, delta) {
  var p = catalogo.produtos.find(prod => normalizarReferencia(prod.codigo) === ref);
  if(!p) return;
  var step = p.qtdEmbalagem || 1;
  
  if(!cesta[ref]) cesta[ref] = 0;
  cesta[ref] += (delta * step);
  
  if(cesta[ref] <= 0) delete cesta[ref];
  
  var bQty = document.getElementById(`badge-qty-${ref}`);
  var card = document.getElementById(`card-${ref}`);
  if(card) {
    if(cesta[ref] > 0) {
      card.classList.add('sel');
      if(bQty) { bQty.textContent = cesta[ref]; bQty.style.display = 'block'; }
    } else {
      card.classList.remove('sel');
      if(bQty) bQty.style.display = 'none';
    }
  }
  atualizarPainel();
}

function removeCesta(ref) {
  delete cesta[ref];
  var card = document.getElementById(`card-${ref}`);
  var bQty = document.getElementById(`badge-qty-${ref}`);
  if(card) card.classList.remove('sel');
  if(bQty) bQty.style.display = 'none';
  atualizarPainel();
}

function limSel() {
  if(confirm("Deseja realmente limpar toda a sua cesta?")) {
    cesta = {};
    pedidoSalvo = false;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('sel'));
    document.querySelectorAll('.card-badge-qty').forEach(b => b.style.display = 'none');
    atualizarPainel();
  }
}

function abrirSheet() { 
  document.getElementById('sh-ov').classList.add('open'); 
  document.getElementById('b-sheet').classList.add('open'); 
  document.body.style.overflow='hidden'; 
}
function fecharSheet() { 
  document.getElementById('sh-ov').classList.remove('open'); 
  document.getElementById('b-sheet').classList.remove('open'); 
  document.body.style.overflow=''; 
}

// MODAL PRODUTO
function abrirModal(ref) {
  refModalAtivo = ref;
  var p = catalogo.produtos.find(prod => normalizarReferencia(prod.codigo) === ref);
  if(!p) return;

  var tabelaAtiva = tabelaAtualAplicada || getTabelaAtual();
  var precoUn = getPreco(p, tabelaAtiva);

  document.getElementById('modal-cod').textContent = p.codigo;
  document.getElementById('modal-desc').textContent = p.descricao;
  document.getElementById('modal-preco').textContent = 'R$ ' + fmt(precoUn);
  document.getElementById('modal-emb').textContent = 'Multiplicador Master: Múltiplos de ' + p.qtdEmbalagem + ' un';
  
  var qtyAt = cesta[ref] || 0;
  document.getElementById('modal-qty').value = qtyAt > 0 ? qtyAt : p.qtdEmbalagem;

  var img = document.getElementById('modal-img');
  var spin = document.getElementById('modal-spin');
  spin.style.display = 'block'; img.style.display = 'none';

  if(p.fileId) {
    img.src = `https://drive.google.com/thumbnail?id=${p.fileId}&sz=w600`;
    img.onload = () => { spin.style.display = 'none'; img.style.display = 'block'; };
  } else {
    spin.style.display = 'none';
  }

  var btn = document.getElementById('btn-add');
  if(qtyAt > 0) { btn.textContent = "✓ Atualizar Quantidade"; btn.className = "btn-add adicionado"; }
  else { btn.textContent = "Adicionar ao pedido"; btn.className = "btn-add"; }

  document.getElementById('modal').classList.add('open');
}

function fecharModal() { document.getElementById('modal').classList.remove('open'); refModalAtivo = null; }
function clicouFora(e) { if(e.target.id === 'modal') fecharModal(); }

function mudaQtyModal(delta) {
  var inp = document.getElementById('modal-qty');
  var val = parseInt(inp.value) || 0;
  var p = catalogo.produtos.find(prod => normalizarReferencia(prod.codigo) === refModalAtivo);
  var step = p ? p.qtdEmbalagem : 1;
  val += (delta * step);
  if(val < step) val = step;
  inp.value = val;
}

function adicionarDoModal() {
  if(!refModalAtivo) return;
  var val = parseInt(document.getElementById('modal-qty').value) || 0;
  var p = catalogo.produtos.find(prod => normalizarReferencia(prod.codigo) === refModalAtivo);
  
  if(val > 0 && p && val % p.qtdEmbalagem !== 0) {
    val = Math.ceil(val / p.qtdEmbalagem) * p.qtdEmbalagem;
  }

  if(val <= 0) delete cesta[refModalAtivo];
  else cesta[refModalAtivo] = val;

  var card = document.getElementById(`card-${refModalAtivo}`);
  var bQty = document.getElementById(`badge-qty-${refModalAtivo}`);
  if(card) {
    if(val > 0) {
      card.classList.add('sel');
      if(bQty) { bQty.textContent = val; bQty.style.display = 'block'; }
    } else {
      card.classList.remove('sel');
      if(bQty) bQty.style.display = 'none';
    }
  }
  fecharModal();
  atualizarPainel();
  toast('Cesta atualizada!');
}

// ENVIO DE PEDIDO
function abrirFluxoFechamento(origem) {
  fluxoOrigem = origem;
  document.getElementById('modal-cliente').classList.add('open');
}
function fecharModalCliente() { document.getElementById('modal-cliente').classList.remove('open'); }
function clicouForaCliente(e) { if(e.target.id === 'modal-cliente') fecharModalCliente(); }

function salvarPedidoNuvem() {
  var razao = document.getElementById('cli-razao').value.trim();
  if(!razao) { alert('A Razão Social do cliente é obrigatória!'); return; }

  var client = {
    cnpj: document.getElementById('cli-cnpj').value.trim(),
    razao: razao,
    fantasia: document.getElementById('cli-fantasia').value.trim(),
    endereco: document.getElementById('cli-endereco').value.trim(),
    telefone: document.getElementById('cli-telefone').value.trim(),
    email: document.getElementById('cli-email').value.trim(),
    obs: document.getElementById('cli-obs').value.trim()
  };

  var stringItens = dadosAtuaisDoPedido.itens.map(i => `${i.codigo} (${i.qty}un)`).join(', ');

  var payload = {
    clienteInfo: `${client.razao} | CNPJ: ${client.cnpj || 'Isento'} | UF: ${dadosAtuaisDoPedido.uf} | Tel: ${client.telefone || '-'}`,
    itens: stringItens,
    qtd: dadosAtuaisDoPedido.qtd,
    subtotalProdutos: dadosAtuaisDoPedido.subtotalProdutos,
    totalIpi: dadosAtuaisDoPedido.totalIpi,
    totalDescontos: dadosAtuaisDoPedido.totalDescontos,
    valorFrete: dadosAtuaisDoPedido.valorFrete,
    prazo: dadosAtuaisDoPedido.prazo,
    total: dadosAtuaisDoPedido.total
  };

  var btn = document.getElementById(fluxoOrigem === 'd' ? 'btn-orc-d' : 'btn-orc-m');
  btn.disabled = true; btn.textContent = 'A guardar...';

  fecharModalCliente();
  toast('A registar pedido na folha...');

  fetch(URL_GOOGLE_SCRIPT + "?t=" + new Date().getTime(), {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(resData => {
    if(resData.status === 'success') {
      pedidoSalvo = true;
      clienteCompletoAtivo = client;
      toast('Pedido guardado com sucesso!');
      atualizarPainel();
    } else {
      alert('Erro: ' + resData.message);
      atualizarPainel();
    }
  })
  .catch(err => {
    console.error(err);
    toast('Erro de rede ao guardar.');
    atualizarPainel();
  });
}

function baixarPdf() {
  if(!pedidoSalvo || !dadosAtuaisDoPedido) { toast('Guarde o pedido primeiro!'); return; }
  toast('A compilar PDF...');

  var payloadPdf = {
    acao: 'pdf',
    dadosPdf: {
      cliente: clienteCompletoAtivo,
      itens: dadosAtuaisDoPedido.itens,
      contas: {
        subtotal: dadosAtuaisDoPedido.subtotalProdutos,
        valPrazo: dadosAtuaisDoPedido.totalDescontos,
        prazo: dadosAtuaisDoPedido.pctPrazo,
        totalIpi: dadosAtuaisDoPedido.totalIpi,
        valorFrete: dadosAtuaisDoPedido.valorFrete,
        uf: dadosAtuaisDoPedido.uf,
        liquido: dadosAtuaisDoPedido.total,
        tabelaAtiva: dadosAtuaisDoPedido.tabelaAtiva
      }
    }
  };

  fetch(URL_GOOGLE_SCRIPT, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payloadPdf)
  })
  .then(res => res.json())
  .then(resData => {
    if(resData.status === 'success' && resData.base64) {
      var byteChars = atob(resData.base64);
      var byteNumbers = new Array(byteChars.length);
      for (var i = 0; i < byteChars.length; i++) { byteNumbers[i] = byteChars.charCodeAt(i); }
      var blob = new Blob([new Uint8Array(byteNumbers)], { type: 'application/pdf' });
      
      var link = document.createElement('a');
      link.href = window.URL.createObjectURL(blob);
      link.download = `Pedido_${clienteCompletoAtivo.razao.replace(/[^a-z0-9]/gi, '_')}.pdf`;
      link.click();
      toast('PDF descarregado!');
    } else {
      alert('Erro na geração: ' + resData.message);
    }
  })
  .catch(err => { console.error(err); toast('Erro ao chamar motor PDF.'); });
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
